version: "3.9"

services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: dairywatch_user
      POSTGRES_PASSWORD: dairywatch_pass
      POSTGRES_DB: dairywatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dairywatch_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GROK_API_KEY: ${GROK_API_KEY}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_DEFAULT_SENDER: igariuramuraguri@gmail.com
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8181:80"
    volumes:
      - ./Docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - .:/app
    depends_on:
      - web

volumes:
  postgres_data: