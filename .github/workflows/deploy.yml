name: DairyWatch CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Test ───────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dairywatch_user
          POSTGRES_PASSWORD: dairywatch_pass
          POSTGRES_DB: dairywatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://dairywatch_user:dairywatch_pass@localhost:5432/dairywatch_test
          JWT_SECRET_KEY: test-secret-key
          GROK_API_KEY: test-key
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test
          MAIL_DEFAULT_SENDER: test@test.com
        run: python -m pytest tests/ -v

  # ── Job 2: Build ──────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t dairywatch:latest .

      - name: Verify build succeeded
        run: docker images dairywatch

  # ── Job 3: Deploy ─────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/dairywatch
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            docker-compose exec -T web python -m flask db upgrade
            echo "✅ DairyWatch deployed successfully"